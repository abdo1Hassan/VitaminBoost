name: tokens-sync

# Source of truth = tokens/tokens.json on main.
# On every push that touches tokens, this workflow:
#   1. Validates the JSON
#   2. Rebuilds src/styles.generated*.css (drift check — fails if hand-edited)
#   3. Pushes tokens.json to the Figma Tokens Studio sync branch,
#      which the Tokens Studio plugin then imports into Figma Variables.
#
# Designers therefore NEVER edit tokens inside Figma.
# Required repo secrets:
#   FIGMA_TOKENS_REPO_PAT — fine-grained PAT with `contents: write` on this repo
#   (Tokens Studio uses git sync, not the Figma REST API, so no Figma token needed)

on:
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "src/styles.css"
  pull_request:
    paths:
      - "tokens/**"
      - "src/styles.css"
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Validate tokens.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('tokens/tokens.json','utf8'))"
          echo "✓ tokens.json is valid JSON"

      - name: Rebuild generated CSS
        run: bunx style-dictionary build --config tokens/style-dictionary.config.cjs

      - name: Drift check (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet src/styles.generated.css src/styles.generated.dark.css; then
            echo "::error::Generated CSS is out of sync with tokens.json. Run 'bun run tokens:build' and commit."
            git --no-pager diff src/styles.generated.css src/styles.generated.dark.css
            exit 1
          fi

      - name: Push to figma-tokens branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.FIGMA_TOKENS_REPO_PAT }}
        run: |
          git config user.name  "tokens-bot"
          git config user.email "tokens-bot@users.noreply.github.com"
          # Tokens Studio plugin in Figma watches this branch (configure once in plugin settings).
          git checkout -B figma-tokens
          git add tokens/tokens.json
          git commit -m "chore(tokens): sync from main @ ${GITHUB_SHA::7}" --allow-empty
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" figma-tokens
